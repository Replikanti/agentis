[advisories]
# Handled by cargo audit separately.
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
]

[bans]
multiple-versions = "warn"
deny = [
    { crate = "tokio", wrappers = [] },
    { crate = "serde", wrappers = [] },
    { crate = "serde_derive", wrappers = [] },
]

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
